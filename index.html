<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Inteligente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor">

        <h1>Workspace Inteligente</h1>

        <div class="agregar-tarea">
            <input type="text" id="inputTarea" placeholder="Escribe una tarea">
            <button id="btnAgregar">Agregar</button>
        </div>

        <div class="filtros">
            <button data-filtro="todas">Todas</button>
            <button data-filtro="pendientes">Pendientes</button>
            <button data-filtro="completadas">Completadas</button>
        </div>

        <ul id="listaTareas"></ul>

    </div>

    <script src="script.js"></script>
</body>
</html>
